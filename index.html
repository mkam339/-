<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إتقان | المحاكي الواقعي للتجميعات</title>
    <style>
        :root { --main-red: #ff003c; }
        body { background: #050505; color: white; font-family: 'Cairo', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        
        /* منطقة العرض الواقعي */
        #pc-builder-stage {
            width: 100%; max-width: 800px; height: 500px;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            position: relative; overflow: hidden; border: 2px solid #222; margin: 20px 0;
        }

        /* الطبقات التي تركب فوق بعضها (واقعية 100%) */
        .layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: contain; background-repeat: no-repeat; background-position: center; transition: 0.5s; }
        
        .controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; width: 90%; max-width: 1000px; padding: 20px; }
        select { padding: 10px; background: #111; color: white; border: 1px solid #444; border-radius: 5px; cursor: pointer; }
        button { padding: 15px; background: var(--main-red); color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

    <h2 style="margin-top:20px;">محاكي إتقان الواقعي لتجميع الأجهزة</h2>

    <div id="pc-builder-stage">
        <div id="layer-case" class="layer" style="background-image: url('https://itcan.store/images/case-black.png'); z-index: 1;"></div>
        <div id="layer-gpu" class="layer" style="background-image: url('https://itcan.store/images/gpu-4060.png'); z-index: 2;"></div>
        <div id="layer-cooler" class="layer" style="background-image: url('https://itcan.store/images/cooler-air.png'); z-index: 3;"></div>
    </div>

    <div class="controls">
        <select id="case-select" onchange="updateRealParts()">
            <option value="black">كيسة إتقان سوداء</option>
            <option value="white">كيسة إتقان بيضاء</option>
        </select>
        <select id="gpu-select" onchange="updateRealParts()">
            <option value="4060">كرت RTX 4060</option>
            <option value="4090">كرت RTX 4090 (العملاق)</option>
        </select>
        <select id="cooler-select" onchange="updateRealParts()">
            <option value="air">تبريد هوائي</option>
            <option value="liquid">تبريد مائي RGB</option>
        </select>
    </div>

    <button onclick="orderNow()">تأكيد وطلب هذه التجميعة الواقعية</button>

    <script>
        function updateRealParts() {
            // هنا يتم تغيير الصور لتطابق القطع الحقيقية
            document.getElementById('layer-case').style.backgroundImage = `url('https://itcan.store/images/case-${document.getElementById('case-select').value}.png')`;
            document.getElementById('layer-gpu').style.backgroundImage = `url('https://itcan.store/images/gpu-${document.getElementById('gpu-select').value}.png')`;
            document.getElementById('layer-cooler').style.backgroundImage = `url('https://itcan.store/images/cooler-${document.getElementById('cooler-select').value}.png')`;
        }

        function orderNow() {
            alert("تم إرسال طلب التجميعة بالمواصفات التي اخترتها بدقة!");
            // كود الربط بالواتساب...
        }
    </script>
</body>
</html>
