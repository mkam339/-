<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إتقان | المحاكي الواقعي للتجميعات</title>
    <style>
        body { background: #050505; color: #fff; font-family: 'Cairo', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        
        /* منطقة التجميع (النتيجة) */
        #assembly-area { width: 100%; height: 400px; background: #0a0a0a; border: 2px solid #333; position: relative; margin-bottom: 30px; display: flex; justify-content: center; align-items: center; border-radius: 15px; overflow: hidden; }
        .piece { position: absolute; max-width: 90%; max-height: 90%; transition: 0.3s; }

        /* منطقة الاختيارات */
        .selection-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { background: #111; padding: 15px; border-radius: 10px; border: 1px solid #333; text-align: center; cursor: pointer; transition: 0.3s; }
        .card:hover { border-color: #ff003c; transform: translateY(-5px); }
        .card img { width: 100%; height: 150px; object-fit: contain; }
        
        button { width: 100%; padding: 20px; background: #ff003c; color: white; border: none; font-size: 1.2rem; font-weight: bold; cursor: pointer; border-radius: 10px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center;">اختر قطع جهازك الواقعية</h2>
    
    <div id="assembly-area">
        <img id="view-case" class="piece" src="" style="z-index: 1;">
        <img id="view-gpu" class="piece" src="" style="z-index: 2;">
        <img id="view-cooler" class="piece" src="" style="z-index: 3;">
    </div>

    <div class="selection-grid">
        <div class="card" onclick="setPiece('case', 'https://itcan.store/images/case-black.png')">
            <img src="https://itcan.store/images/case-black.png">
            <p>كيسة إتقان سوداء</p>
        </div>
        <div class="card" onclick="setPiece('case', 'https://itcan.store/images/case-white.png')">
            <img src="https://itcan.store/images/case-white.png">
            <p>كيسة إتقان بيضاء</p>
        </div>
        <div class="card" onclick="setPiece('gpu', 'https://itcan.store/images/gpu-4060.png')">
            <img src="https://itcan.store/images/gpu-4060.png">
            <p>كرت RTX 4060</p>
        </div>
        <div class="card" onclick="setPiece('gpu', 'https://itcan.store/images/gpu-4090.png')">
            <img src="https://itcan.store/images/gpu-4090.png">
            <p>كرت RTX 4090</p>
        </div>
    </div>

    <button onclick="alert('تم تجهيز طلبك الواقعي، جاري التحويل للواتساب...')">تأكيد التجميعة وطلبها</button>
</div>

<script>
    function setPiece(type, imgSrc) {
        document.getElementById('view-' + type).src = imgSrc;
    }
</script>

</body>
</html>
